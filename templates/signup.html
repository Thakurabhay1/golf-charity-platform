{% extends "base.html" %}
{% block title %}Subscribe — GolfGives{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="form-wrapper" style="max-width:560px;">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🏆</div>
      <h2 style="font-weight:800;margin-top:0.5rem;">Start Your Journey</h2>
      <p style="color:var(--muted);">Play golf. Win prizes. Support charity.</p>
    </div>
    <div id="signupAlert"></div>
    <form id="signupForm">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="John Smith" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required minlength="8">
      </div>
      <div class="mb-3">
        <label class="form-label">Subscription Plan</label>
        <div class="row g-2">
          <div class="col-6">
            <div class="charity-card" id="planMonthly" onclick="selectPlan('monthly')" style="padding:1rem;">
              <div style="font-weight:700;">Monthly</div>
              <div style="color:var(--primary);font-size:1.3rem;font-weight:800;">£9.99</div>
              <div style="color:var(--muted);font-size:0.8rem;">per month</div>
            </div>
          </div>
          <div class="col-6">
            <div class="charity-card" id="planYearly" onclick="selectPlan('yearly')" style="padding:1rem;">
              <div style="font-weight:700;">Yearly <span style="color:var(--primary);font-size:0.75rem;">Save 17%</span></div>
              <div style="color:var(--accent);font-size:1.3rem;font-weight:800;">£99.99</div>
              <div style="color:var(--muted);font-size:0.8rem;">per year</div>
            </div>
          </div>
        </div>
        <input type="hidden" id="subscriptionType" value="monthly">
      </div>
      <div class="mb-4">
        <label class="form-label">Choose Your Charity</label>
        <div class="row g-2" id="charityList">
          <div class="col-12" style="color:var(--muted);font-size:0.9rem;">Loading charities...</div>
        </div>
        <input type="hidden" id="charityId">
      </div>
      <button type="submit" class="btn btn-primary w-100" id="signupBtn">Subscribe Now →</button>
    </form>
    <p class="text-center mt-3" style="color:var(--muted);">
      Already subscribed? <a href="/login" style="color:var(--primary);font-weight:600;">Login</a>
    </p>
  </div>
</div>

<script>
let selectedPlan = 'monthly';
let selectedCharity = null;

selectPlan('monthly');

function selectPlan(plan) {
  selectedPlan = plan;
  document.getElementById('subscriptionType').value = plan;
  document.getElementById('planMonthly').classList.toggle('selected', plan === 'monthly');
  document.getElementById('planYearly').classList.toggle('selected', plan === 'yearly');
}

function selectCharity(id) {
  selectedCharity = id;
  document.getElementById('charityId').value = id;
  document.querySelectorAll('.charity-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('charity-' + id).classList.add('selected');
}

fetch('/api/charities').then(r => r.json()).then(data => {
  const el = document.getElementById('charityList');
  if (!data.length) { el.innerHTML = '<div style="color:var(--muted);">No charities available.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="col-6">
      <div class="charity-card charity-opt" id="charity-${c.id}" onclick="selectCharity(${c.id})" style="padding:0.8rem;font-size:0.9rem;">
        <div style="font-weight:700;">${c.name}</div>
        <div style="color:var(--muted);font-size:0.78rem;">${c.description.substring(0,50)}...</div>
      </div>
    </div>`).join('');
}).catch(() => {});

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const alert = document.getElementById('signupAlert');
  if (!selectedCharity) {
    alert.innerHTML = `<div class="alert alert-danger">Please select a charity.</div>`; return;
  }
  const btn = document.getElementById('signupBtn');
  btn.textContent = 'Creating account...'; btn.disabled = true;
  try {
    const res = await fetch('/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        subscription_type: selectedPlan,
        charity_id: parseInt(selectedCharity),
        contribution_percentage: 10.0
      })
    });
    const data = await res.json();
    if (res.ok) {
      alert.innerHTML = `<div class="alert alert-success">Account created! Redirecting to login...</div>`;
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      alert.innerHTML = `<div class="alert alert-danger">${data.detail}</div>`;
      btn.textContent = 'Subscribe Now →'; btn.disabled = false;
    }
  } catch {
    alert.innerHTML = `<div class="alert alert-danger">Connection error. Try again.</div>`;
    btn.textContent = 'Subscribe Now →'; btn.disabled = false;
  }
});
</script>
{% endblock %}
