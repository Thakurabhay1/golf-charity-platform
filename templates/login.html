{% extends "base.html" %}
{% block title %}Login — GolfGives{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="form-wrapper">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">⛳</div>
      <h2 style="font-weight:800;margin-top:0.5rem;">Welcome Back</h2>
      <p style="color:var(--muted);">Login to your GolfGives account</p>
    </div>
    <div id="loginAlert"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login →</button>
    </form>
    <p class="text-center mt-3" style="color:var(--muted);">
      Don't have an account? <a href="/signup" style="color:var(--primary);font-weight:600;">Subscribe Now</a>
    </p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Logging in...'; btn.disabled = true;
  const alert = document.getElementById('loginAlert');
  const form = new FormData();
  form.append('username', document.getElementById('email').value);
  form.append('password', document.getElementById('password').value);
  try {
    const res = await fetch('/auth/login', { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.access_token);
      window.location.href = '/dashboard';
    } else {
      alert.innerHTML = `<div class="alert alert-danger">${data.detail}</div>`;
      btn.textContent = 'Login →'; btn.disabled = false;
    }
  } catch {
    alert.innerHTML = `<div class="alert alert-danger">Connection error. Try again.</div>`;
    btn.textContent = 'Login →'; btn.disabled = false;
  }
});
</script>
{% endblock %}
